<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasure Benchmark Explorer</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin-bottom: 10px; }
    #editor { width: 100%; height: 200px; font-family: monospace; font-size: 14px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    #run-btn { margin: 10px 0; padding: 8px 20px; font-size: 14px; cursor: pointer; }
    #output { margin-top: 10px; }
    #output table { border-collapse: collapse; width: 100%; }
    #output th, #output td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    #output th { background: #f5f5f5; }
    #output tr:nth-child(even) { background: #fafafa; }
    .error { color: #c00; background: #fee; border: 1px solid #c00; padding: 10px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>Wasure Benchmark Explorer</h1>
  <textarea id="editor">function query(tables) {
  // Globals: aq (Arquero), op (operators)
  const { benchmarks, scores, runtimes } = tables;
  return scores;
}</textarea>
  <button id="run-btn">Run</button>
  <div id="output"><span class="loading">Loading data...</span></div>

  <script type="module">
    import * as aq from "https://cdn.jsdelivr.net/npm/arquero@5.4.1/+esm";
    import { buildTables } from "./zoo.js";

    window.aq = aq;
    window.op = aq.op;
    let tables = null;

    function renderTable(table) {
      return table.toHTML();
    }

    function runQuery() {
      const output = document.getElementById("output");
      const code = document.getElementById("editor").value;

      try {
        const fn = new Function("tables", `${code}\nreturn query(tables);`);
        const result = fn(tables);

        if (result && typeof result.toHTML === "function") {
          output.innerHTML = renderTable(result);
        } else if (result !== undefined) {
          output.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        } else {
          output.innerHTML = "<em>No result returned</em>";
        }
      } catch (e) {
        output.innerHTML = `<div class="error">${e.name}: ${e.message}</div>`;
      }
    }

    async function init() {
      const output = document.getElementById("output");
      try {
        const response = await fetch("./wasure-results.csv");
        const csvContent = await response.text();
        tables = buildTables(csvContent);
        runQuery();
      } catch (e) {
        output.innerHTML = `<div class="error">Failed to load data: ${e.message}</div>`;
      }
    }

    document.getElementById("run-btn").addEventListener("click", runQuery);
    init();
  </script>
</body>
</html>
